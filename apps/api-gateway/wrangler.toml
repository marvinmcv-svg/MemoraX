name = "memorax-api-gateway"
main = "src/index.ts"
compatibility_date = "2024-06-14"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[observability]
enabled = true

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "abc123"

[[d1_databases]]
binding = "DB"
database_name = "memorax"
database_id = "def456"
