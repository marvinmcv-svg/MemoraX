<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      background: #0A0A0F;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid #2A2A3A;
    }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366F1 0%, #818CF8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }
    .title {
      font-weight: 600;
      font-size: 16px;
    }
    .content {
      padding: 16px;
    }
    .textarea {
      width: 100%;
      min-height: 120px;
      background: #12121A;
      border: 1px solid #2A2A3A;
      border-radius: 12px;
      padding: 12px;
      color: #F8FAFC;
      font-size: 14px;
      resize: none;
      font-family: inherit;
    }
    .textarea:focus {
      outline: none;
      border-color: #6366F1;
    }
    .textarea::placeholder {
      color: #64748B;
    }
    .save-btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background: #6366F1;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover {
      background: #818CF8;
    }
    .save-btn:disabled {
      background: #2A2A3A;
      cursor: not-allowed;
    }
    .info {
      margin-top: 16px;
      padding: 12px;
      background: #12121A;
      border-radius: 10px;
      font-size: 12px;
      color: #94A3B8;
    }
    .info strong {
      color: #F8FAFC;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">M</div>
    <span class="title">MemoraX</span>
  </div>
  <div class="content">
    <textarea class="textarea" id="capture-text" placeholder="What's worth remembering?"></textarea>
    <button class="save-btn" id="save-btn">Save Memory</button>
    <div class="info">
      <strong>Tip:</strong> Select text on any webpage, right-click, and choose "Save to MemoraX" for quick capture.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
